---
name: Door Security Production CI/CD
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - ".gitignore"

permissions:
  contents: write
  packages: write

jobs:
  build-env:
    runs-on: ubuntu-latest
    # NEW: Only run this job if the Dockerfile was modified
    outputs:
      docker_changed: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for Dockerfile changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - 'Dockerfile'

      - name: Log in to GHCR
        if: steps.filter.outputs.docker == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        if: steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/aesd-build-env:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: build-env
    container:
      image: ghcr.io/${{ github.repository_owner }}/aesd-build-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Version Environment Variable
        run: |
          git config --global --add safe.directory '*'
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=$SHORT_SHA" >> $GITHUB_ENV
          echo "GIT_HASH=$SHORT_SHA" >> $GITHUB_ENV

      # DEBUG BUILD: Coverage & Documentation
      - name: Build Debug & Test
        run: |
          chmod +x build.sh
          ./build.sh debug

          mkdir -p staging
          cp build/coverage_pct.txt staging/
          cp -r build/coverage_report staging/
          cp -r docs staging/

      # RELEASE BUILD: ARM Production Binary
      - name: Build Release (ARM)
        run: ./build.sh release

      # SWUPDATE: Hash Injection, Signing & Packaging
      - name: Generate Signed SWU
        env:
          PRIV_KEY: ${{ secrets.SWUPDATE_PRIVATE_KEY }}
        run: |
          git config --global --add safe.directory '*'
          # Set Versioning using Git hash
          UPDATE_DIR="bin"

          # Hash the packages
          DAEMON_HASH=$(sha256sum ${UPDATE_DIR}/door_security_daemon | awk '{print $1}')
          INIT_HASH=$(sha256sum pkg/buildroot/S99door_security_daemon | awk '{print $1}')

          # Inject hashes into the sw-description template
          cp pkg/swupdate/sw-description.tmpl ${UPDATE_DIR}/sw-description
          sed -i "s/VERSION_HERE/${{ env.VERSION }}/" ${UPDATE_DIR}/sw-description
          sed -i "s/DAEMON_HASH_HERE/$DAEMON_HASH/" ${UPDATE_DIR}/sw-description
          sed -i "s/INIT_HASH_HERE/$INIT_HASH/" ${UPDATE_DIR}/sw-description

          # Sign the Manifest
          printf "%s\n" "$PRIV_KEY" > swupdate-priv.pem
          if [ ! -s swupdate-priv.pem ]; then
              echo "ERROR: PRIV_KEY environment variable is empty!"
              exit 1
          fi
          openssl dgst -sha256 -sign swupdate-priv.pem \
            -out ${UPDATE_DIR}/sw-description.sig \
            ${UPDATE_DIR}/sw-description
          rm swupdate-priv.pem

          # Copy the init script to the staging area (bin/)
          cp pkg/buildroot/S99door_security_daemon ${UPDATE_DIR}/
          cp pkg/swupdate/update_app_version.sh ${UPDATE_DIR}/

          FILES="sw-description sw-description.sig door_security_daemon S99door_security_daemon update_app_version.sh"

          SWU_NAME="door-app-update-${{ env.VERSION }}.swu"
          echo "Creating .swu package for version ${{ env.VERSION }}..."
          cd ${UPDATE_DIR}
          for i in $FILES; do
              echo "$i"
          done | cpio -ov -H crc > "$SWU_NAME"

          cp "$SWU_NAME" ../staging/
          cd ..
          echo "--- Build Complete: $SWU_NAME ---"


      # Upload Binaries to Release UI
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}-${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            bin/door_security_daemon
            bin/door-app-update-${{ env.VERSION }}.swu
            bin/sw-description
            bin/S99door_security_daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # DEPLOY DASHBOARD: Push to gh-pages
      - name: Deploy to gh-pages
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git config --global --add safe.directory '*'

          git add staging/
          git stash push -m "staging"

          git fetch origin gh-pages || echo "Branch does not exist yet"
          git checkout gh-pages || git checkout -b gh-pages

          git stash pop || echo "Nothing to restore"
          git reset staging/

          ls -A | grep -vE "index.html|.gitignore|.github|staging|.git" | xargs rm -rf || true

          # Restore Staged Assets
          cp staging/coverage_pct.txt .
          cp -rf staging/coverage_report ./coverage

          mkdir -p docs
          cp -rf staging/docs/html/* ./docs/
          cp -rf staging/docs/latex ./latex_src

          # Badge JSON for Shields.io
          COVERAGE_PCT=$(cat coverage_pct.txt)
          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"$COVERAGE_PCT%\", \"color\": \"green\"}" > coverage-badge.json

          echo "{\"schemaVersion\": 1, \"label\": \"latest version\", \"message\": \"${{ env.VERSION }}\", \"color\": \"blue\"}" > version-badge.json
          # Also save it as a raw text file for easy fetching by a script
          echo "${{ env.VERSION }}" > latest_version.txt

          # Keep a copy of release files on the web server
          mkdir -p releases
          cp staging/door-app-update-${{ env.VERSION }}.swu releases/

          rm -rf staging
          git add .
          git commit -m "🚀 CI: Deploy Assets & Coverage $COVERAGE_PCT%" || echo "No changes"
          git push origin gh-pages --force
